name: Docs

# Build the WIDOCO HTML documentation and publish it to GitHub Pages.
# The "Configure Pages" step enables Pages automatically (enablement: true); if
# your token can't enable it, set Source to "GitHub Actions" in repo Settings → Pages.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment, but let an in-flight production deploy
# finish rather than cancelling it (GitHub's recommended setting for Pages).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install dependencies
        run: pip install -r tooling/requirements.txt
      - name: Build dist artifacts
        run: python tooling/build.py
      - name: Generate WIDOCO documentation
        run: python tooling/docs.py
      - name: Add HCM-systems contribution form to the site
        run: |
          mkdir -p docs/widoco/contribute
          cp docs/hcm-systems/contribute/index.html docs/widoco/contribute/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/widoco

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
