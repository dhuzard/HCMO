name: Validate Ontology

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r tooling/requirements.txt
      - name: Build dist (verify it is up to date)
        run: |
          python tooling/build.py
          if ! git diff --quiet -- dist/; then
            echo "::error::dist/ is out of date. Run 'python tooling/build.py' and commit the result."
            git --no-pager diff --stat -- dist/
            exit 1
          fi
      - name: Validate (parse + SHACL + competency queries)
        run: python tooling/validate.py
