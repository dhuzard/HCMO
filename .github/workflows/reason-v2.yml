name: Reason HCMO v2

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hermit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install reasoning dependencies
        run: pip install -r tooling/reasoning-requirements.txt
      - name: Run clean v2 HermiT check
        run: python tooling/reason_v2.py --build-clean --java-memory 2000
